    <style>
        .blog-hero {
            background: linear-gradient(135deg, var(--forest-green) 0%, var(--emerald) 50%, #388E3C 100%);
            padding: 80px 0 60px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .blog-hero::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 70%);
            border-radius: 50%;
        }
        .blog-hero::after {
            content: '';
            position: absolute;
            bottom: -30%;
            left: -10%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(249,168,37,0.1) 0%, transparent 70%);
            border-radius: 50%;
        }
        .blog-hero h1 {
            font-size: 2.8rem;
            font-weight: 800;
            color: #fff;
            margin-bottom: 16px;
            position: relative;
            z-index: 1;
        }
        .blog-hero h1 span {
            color: var(--amber-gold);
        }
        .blog-hero .breadcrumb {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            font-size: 0.95rem;
            color: rgba(255,255,255,0.8);
            position: relative;
            z-index: 1;
        }
        .blog-hero .breadcrumb a {
            color: var(--amber-gold);
            font-weight: 500;
            text-decoration: none;
        }

        .blog-section {
            padding: 60px 0 80px;
            background: #f8f9fa;
        }

        .blog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 32px;
            margin-top: 20px;
        }

        .blog-card {
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 16px rgba(0,0,0,0.08);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
        }
        .blog-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.14);
        }

        .blog-card__image {
            width: 100%;
            height: 210px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        .blog-card__image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.4s ease;
        }
        .blog-card:hover .blog-card__image img {
            transform: scale(1.05);
        }
        .blog-card__image-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            color: rgba(255,255,255,0.9);
        }
        .blog-card__image-placeholder i {
            font-size: 3.2rem;
            opacity: 0.95;
        }
        .blog-card__image-placeholder span {
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.8;
        }

        .blog-card__body {
            padding: 24px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .blog-card__date {
            font-size: 0.82rem;
            color: var(--color-gold);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
        }

        .blog-card__title {
            font-size: 1.15rem;
            font-family: var(--font-heading);
            font-weight: 700;
            color: var(--color-navy);
            margin-bottom: 12px;
            line-height: 1.4;
        }

        .blog-card__excerpt {
            font-size: 0.92rem;
            color: #555;
            line-height: 1.7;
            flex: 1;
            margin-bottom: 20px;
        }

        .blog-card__link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--color-navy);
            font-weight: 600;
            font-size: 0.9rem;
            text-decoration: none;
            transition: color 0.2s;
        }
        .blog-card__link:hover {
            color: var(--color-gold);
        }

        .blog-loading {
            text-align: center;
            padding: 60px 20px;
            color: #777;
        }
        .blog-empty {
            text-align: center;
            padding: 60px 20px;
            color: #777;
        }
        .blog-empty i {
            font-size: 3rem;
            color: #ccc;
            display: block;
            margin-bottom: 16px;
        }

        @media (max-width: 768px) {

            .blog-grid { grid-template-columns: 1fr; gap: 20px; }

<body>

    <div id="header-placeholder"></div>

    <main id="main-content">

    <!-- BLOG HERO -->
    <section class="blog-hero">
        <div class="container">
            <h1>College <span>Blog</span></h1>
            <nav class="breadcrumb" aria-label="Breadcrumb">
                <a href="/"><i class="fas fa-home"></i> Home</a>
                <i class="fas fa-chevron-right"></i>
                <span>Blog</span>
            </nav>
        </div>
    </section>

    <!-- BLOG POSTS -->
    <section class="blog-section">
        <div class="container">
            <div id="blogGrid" class="blog-grid">
                <div class="blog-loading" style="grid-column:1/-1;">
                    <i class="fas fa-spinner fa-spin" style="font-size:2rem;color:#ccc;"></i>
                    <p style="margin-top:12px;">Loading posts...</p>
                </div>
            </div>
        </div>
    </section>

    </main>

    <div id="footer-placeholder"></div>

    <script src="components.min.js?v=20260308" defer></script>
    <script>
        fetch('posts.json')
            .then(function(r) { return r.json(); })
            .then(function(posts) {
                var grid = document.getElementById('blogGrid');
                if (!posts || posts.length === 0) {
                    grid.innerHTML = '<div class="blog-empty" style="grid-column:1/-1;"><i class="fas fa-pen-nib"></i><p>No blog posts yet. Check back soon!</p></div>';
                    return;
                }
                grid.innerHTML = posts.map(function(post) {
                    var color = post.color || '#1B5E20';
                    var icon = post.icon || 'fa-graduation-cap';
                    var webpSrc = post.image ? post.image.replace(/\.(jpe?g|png)$/i, '.webp') : null;
                    var imgHtml = post.image
                        ? '<picture><source srcset="' + webpSrc + '" type="image/webp"><img src="' + post.image + '" alt="' + post.title + '" loading="lazy" width="400" height="210"></picture>'
                        : '<div class="blog-card__image-placeholder"><i class="fas ' + icon + '"></i><span>Nagachethana PUC</span></div>';
                    var imgStyle = post.image ? '' : ' style="background:linear-gradient(135deg,' + color + ' 0%,' + color + 'cc 100%)"';
                    return '<a href="' + post.link + '" class="blog-card" style="text-decoration:none;color:inherit;">' +
                        '<div class="blog-card__image"' + imgStyle + '>' + imgHtml + '</div>' +
                        '<div class="blog-card__body">' +
                            '<div class="blog-card__date"><i class="fas fa-calendar-alt"></i> ' + post.date + '</div>' +
                            '<h2 class="blog-card__title">' + post.title + '</h2>' +
                            '<p class="blog-card__excerpt">' + post.excerpt + '</p>' +
                            '<span class="blog-card__link">Read More <i class="fas fa-arrow-right"></i></span>' +
                        '</div>' +
                    '</a>';
                }).join('');
            })
            .catch(function() {
                document.getElementById('blogGrid').innerHTML = '<div class="blog-empty" style="grid-column:1/-1;"><i class="fas fa-exclamation-circle"></i><p>Could not load posts. Please try again later.</p></div>';
            });
    </script>
    <script src="script.min.js?v=20260308" defer></script>
</body>
